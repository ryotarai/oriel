name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build all platforms
        run: make build-all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: bin/*

  update-homebrew:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ryotarai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Compute checksums and update formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          download_and_sha256() {
            local asset="$1"
            local url="https://github.com/ryotarai/oriel/releases/download/${TAG}/${asset}"
            curl -fsSL "$url" -o "/tmp/${asset}"
            sha256sum "/tmp/${asset}" | awk '{print $1}'
          }

          SHA256_DARWIN_AMD64=$(download_and_sha256 "oriel-darwin-amd64")
          SHA256_DARWIN_ARM64=$(download_and_sha256 "oriel-darwin-arm64")
          SHA256_LINUX_AMD64=$(download_and_sha256 "oriel-linux-amd64")
          SHA256_LINUX_ARM64=$(download_and_sha256 "oriel-linux-arm64")

          cat > homebrew-tap/Formula/oriel.rb <<'FORMULA_END'
class Oriel < Formula
  desc "Rich web UI for Claude Code"
  homepage "https://github.com/ryotarai/oriel"
  version "VERSION_PLACEHOLDER"
  license "MIT"

  on_macos do
    on_intel do
      url "https://github.com/ryotarai/oriel/releases/download/vVERSION_PLACEHOLDER/oriel-darwin-amd64"
      sha256 "SHA256_DARWIN_AMD64_PLACEHOLDER"
    end
    on_arm do
      url "https://github.com/ryotarai/oriel/releases/download/vVERSION_PLACEHOLDER/oriel-darwin-arm64"
      sha256 "SHA256_DARWIN_ARM64_PLACEHOLDER"
    end
  end

  on_linux do
    on_intel do
      url "https://github.com/ryotarai/oriel/releases/download/vVERSION_PLACEHOLDER/oriel-linux-amd64"
      sha256 "SHA256_LINUX_AMD64_PLACEHOLDER"
    end
    on_arm do
      url "https://github.com/ryotarai/oriel/releases/download/vVERSION_PLACEHOLDER/oriel-linux-arm64"
      sha256 "SHA256_LINUX_ARM64_PLACEHOLDER"
    end
  end

  def install
    bin.install stable.url.split("/").last => "oriel"
  end
end
FORMULA_END

          sed -i \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/SHA256_DARWIN_AMD64_PLACEHOLDER/${SHA256_DARWIN_AMD64}/" \
            -e "s/SHA256_DARWIN_ARM64_PLACEHOLDER/${SHA256_DARWIN_ARM64}/" \
            -e "s/SHA256_LINUX_AMD64_PLACEHOLDER/${SHA256_LINUX_AMD64}/" \
            -e "s/SHA256_LINUX_ARM64_PLACEHOLDER/${SHA256_LINUX_ARM64}/" \
            homebrew-tap/Formula/oriel.rb

      - name: Commit and push updated formula
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/oriel.rb
          git commit -m "Update oriel to ${VERSION}"
          git push
